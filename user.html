<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - 机械动力蓝图社区</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="page.svg">
    <style>
        .profile-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .profile-header {
            position: relative;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
            border: 1px solid #2a2a2a;
        }
        .profile-banner {
            width: 100%;
            height: 200px;
            background: #0f172a;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .profile-banner .banner-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            font-size: 0.9rem;
        }
        .profile-avatar {
            position: absolute;
            bottom: -40px;
            left: 32px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #1a1a1a;
            overflow: hidden;
            background: #0f172a;
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-avatar .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            font-size: 2.5rem;
        }
        .profile-info {
            padding: 48px 32px 24px 32px;
        }
        .profile-name {
            color: #e2e8f0;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .profile-username {
            color: #6b7280;
            font-size: 0.85rem;
        }
        .profile-bio {
            color: #94a3b8;
            margin-top: 8px;
            font-size: 0.95rem;
            max-width: 600px;
        }
        .profile-stats {
            display: flex;
            gap: 24px;
            margin-top: 12px;
        }
        .profile-stats span {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .profile-stats .num {
            color: #e2e8f0;
            font-weight: 600;
        }
        .profile-actions {
            margin-top: 12px;
            display: flex;
            gap: 12px;
        }
        .edit-btn {
            padding: 6px 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .edit-btn:hover {
            background: #2563eb;
        }
        .profile-blueprints {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .blueprint-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }
        .blueprint-card:hover {
            transform: translateY(-4px);
            border-color: #3b82f6;
        }
        .blueprint-title {
            color: #e2e8f0;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .blueprint-desc {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .blueprint-meta {
            color: #6b7280;
            font-size: 0.75rem;
        }
        .blueprint-link {
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .blueprint-link:hover {
            text-decoration: underline;
        }
        .no-blueprints {
            text-align: center;
            color: #6b7280;
            padding: 40px;
        }
        .loading {
            text-align: center;
            color: #6b7280;
            padding: 40px;
        }
        .empty {
            text-align: center;
            color: #6b7280;
            padding: 40px;
        }
        /* 编辑弹窗 */
        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .edit-modal.active {
            display: flex;
        }
        .edit-modal-content {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .edit-modal-content h3 {
            color: #e2e8f0;
            margin-bottom: 16px;
        }
        .edit-modal-content label {
            color: #94a3b8;
            display: block;
            margin-bottom: 4px;
            font-size: 0.85rem;
        }
        .edit-modal-content input,
        .edit-modal-content textarea {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #e2e8f0;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        .edit-modal-content textarea {
            min-height: 80px;
            resize: vertical;
        }
        .edit-modal-content .btn-row {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .edit-modal-content .btn-row button {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }
        .btn-save {
            background: #3b82f6;
            color: white;
        }
        .btn-save:hover {
            background: #2563eb;
        }
        .btn-cancel {
            background: #2a2a2a;
            color: #e2e8f0;
        }
        .btn-cancel:hover {
            background: #3a3a3a;
        }
        .image-crop-area {
            margin: 12px 0;
            text-align: center;
        }
        .image-crop-area img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
        }
        .crop-btn {
            padding: 6px 16px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 8px;
        }
        .crop-btn:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

    <div class="profile-container" id="profileContainer">
        <div class="loading">加载中...</div>
    </div>

    <!-- 编辑弹窗 -->
    <div class="edit-modal" id="editModal">
        <div class="edit-modal-content">
            <h3>编辑个人资料</h3>
            
            <label>头像</label>
            <input type="file" id="avatarInput" accept="image/*">
            <div class="image-crop-area" id="avatarCropArea" style="display:none;">
                <img id="avatarCropPreview">
                <button class="crop-btn" onclick="cropImage('avatar')">确认裁切</button>
            </div>
            
            <label>背景图</label>
            <input type="file" id="bannerInput" accept="image/*">
            <div class="image-crop-area" id="bannerCropArea" style="display:none;">
                <img id="bannerCropPreview">
                <button class="crop-btn" onclick="cropImage('banner')">确认裁切</button>
            </div>
            
            <label>个人简介</label>
            <textarea id="bioInput" placeholder="写点什么..." maxlength="200"></textarea>
            
            <div class="btn-row">
                <button class="btn-cancel" onclick="closeEditModal()">取消</button>
                <button class="btn-save" onclick="saveProfile()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ===== API 地址（独立定义，不依赖 script.js）=====
        const API_URL = 'http://energetic-presence.railway.internal/api';

        // ===== 获取当前用户信息 =====
        let currentUser = null;
        let viewingUsername = '';
        let isOwnProfile = false;
        let cropData = { type: null, file: null };

        function getUsernameFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('user');
        }

        async function loadProfile() {
            const container = document.getElementById('profileContainer');
            viewingUsername = getUsernameFromURL();

            if (!viewingUsername) {
                container.innerHTML = '<div class="empty">请指定用户</div>';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/users/${viewingUsername}`);
                const result = await response.json();

                if (!result.success) {
                    container.innerHTML = '<div class="empty">用户不存在</div>';
                    return;
                }

                currentUser = result.data.user;
                const blueprints = result.data.blueprints || [];
                const loggedInUser = localStorage.getItem('username');
                isOwnProfile = loggedInUser === viewingUsername;

                renderProfile(currentUser, blueprints);
            } catch (error) {
                console.error('加载失败:', error);
                container.innerHTML = '<div class="empty">加载失败: ' + error.message + '</div>';
            }
        }

        function renderProfile(user, blueprints) {
            const container = document.getElementById('profileContainer');
            const avatarUrl = user.avatar_url || '';
            const bannerUrl = user.banner_url || '';
            const bio = user.bio || '这个人很懒，什么都没写。';

            let blueprintsHtml = '';
            if (blueprints.length > 0) {
                blueprintsHtml = blueprints.map(bp => `
                    <div class="blueprint-card">
                        <div class="blueprint-title">${escapeHtml(bp.title)}</div>
                        <div class="blueprint-desc">${escapeHtml(bp.description || '暂无描述')}</div>
                        <div class="blueprint-meta">${formatDate(bp.upload_time || bp.created_at)} · 浏览 ${bp.views || 0}</div>
                        <a href="blueprint.html?id=${bp.id}" class="blueprint-link">查看详情 →</a>
                    </div>
                `).join('');
            } else {
                blueprintsHtml = '<div class="no-blueprints">还没有发布过蓝图</div>';
            }

            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-banner" style="${bannerUrl ? `background-image: url(${bannerUrl});` : ''}">
                        ${!bannerUrl ? '<div class="banner-placeholder">背景图</div>' : ''}
                    </div>
                    <div class="profile-avatar">
                        ${avatarUrl ? `<img src="${avatarUrl}" alt="${escapeHtml(user.username)}">` : '<div class="avatar-placeholder">用户</div>'}
                    </div>
                    <div class="profile-info">
                        <div class="profile-name">${escapeHtml(user.username)}</div>
                        <div class="profile-username">@${escapeHtml(user.username)}</div>
                        <div class="profile-bio">${escapeHtml(bio)}</div>
                        <div class="profile-stats">
                            <span>蓝图 <span class="num">${blueprints.length}</span></span>
                            <span>注册于 ${formatDate(user.created_at || user.registration_time)}</span>
                        </div>
                        ${isOwnProfile ? `
                            <div class="profile-actions">
                                <button class="edit-btn" onclick="openEditModal()">编辑资料</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
                <h2 style="color:#e2e8f0; margin-bottom:16px;">发布的蓝图</h2>
                <div class="profile-blueprints">${blueprintsHtml}</div>
            `;
        }

        // ===== 编辑资料 =====
        function openEditModal() {
            if (!isOwnProfile) return;
            document.getElementById('bioInput').value = currentUser.bio || '';
            document.getElementById('editModal').classList.add('active');
            document.getElementById('avatarCropArea').style.display = 'none';
            document.getElementById('bannerCropArea').style.display = 'none';
            cropData = { type: null, file: null };
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            document.getElementById('avatarInput').value = '';
            document.getElementById('bannerInput').value = '';
            document.getElementById('avatarCropArea').style.display = 'none';
            document.getElementById('bannerCropArea').style.display = 'none';
        }

        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                document.getElementById('avatarCropPreview').src = ev.target.result;
                document.getElementById('avatarCropArea').style.display = 'block';
                cropData.type = 'avatar';
                cropData.file = file;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('bannerInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                document.getElementById('bannerCropPreview').src = ev.target.result;
                document.getElementById('bannerCropArea').style.display = 'block';
                cropData.type = 'banner';
                cropData.file = file;
            };
            reader.readAsDataURL(file);
        });

        async function cropImage(type) {
            const file = cropData.file;
            if (!file) return;

            const formData = new FormData();
            formData.append('image', file);
            formData.append('key', '0bb35dd01d42e7df850d535d2c79e8f6');

            try {
                const response = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.success) {
                    const url = result.data.url;
                    if (type === 'avatar') {
                        currentUser.avatar_url = url;
                        document.getElementById('avatarCropArea').style.display = 'none';
                    } else if (type === 'banner') {
                        currentUser.banner_url = url;
                        document.getElementById('bannerCropArea').style.display = 'none';
                    }
                    alert('图片已上传，保存资料后生效');
                } else {
                    alert('上传失败: ' + (result.error?.message || '未知错误'));
                }
            } catch (error) {
                alert('上传失败: ' + error.message);
            }
        }

        async function saveProfile() {
            const bio = document.getElementById('bioInput').value.trim();

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/users/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        avatar_url: currentUser.avatar_url || null,
                        banner_url: currentUser.banner_url || null,
                        bio: bio || null
                    })
                });
                const result = await response.json();
                if (result.success) {
                    alert('保存成功');
                    closeEditModal();
                    loadProfile();
                } else {
                    alert('保存失败: ' + result.error);
                }
            } catch (error) {
                alert('保存失败: ' + error.message);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function formatDate(dateString) {
            if (!dateString) return '未知';
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return '未知';
            return date.getFullYear() + '-' + (date.getMonth()+1) + '-' + date.getDate();
        }

        // ===== 初始化 =====
        loadProfile();
    </script>
    <script src="sidebar.js"></script>
</body>
</html>
