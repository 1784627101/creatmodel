<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机械动力蓝图分享社区</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            Create<span>Mechanical</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>
            <a href="login.html" class="btn btn-outline">登录</a>
            <a href="register.html" class="btn btn-primary">注册</a>
        </div>
    </nav>

    <main class="container">
        <h1 style="margin-bottom: 8px;">机械动力蓝图分享</h1>
        <p style="color: #9ca3af; margin-bottom: 32px;">发现和分享机械动力模组的优秀蓝图</p>

        <div id="blueprintGrid" class="blueprint-grid">
            <div class="loading">加载中...</div>
        </div>

        <div id="pagination" class="pagination"></div>
    </main>

    <script src="script.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;

        async function loadBlueprints(page = 1) {
            const grid = document.getElementById('blueprintGrid');
            grid.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetch(`${API_URL}/blueprints?page=${page}&limit=12`);
                const result = await response.json();
                
                if (result.success && result.data.length > 0) {
                    grid.innerHTML = '';
                    result.data.forEach(bp => {
                        grid.innerHTML += `
                            <div class="blueprint-card">
                                <div class="blueprint-title">${escapeHtml(bp.title)}</div>
                                <div class="blueprint-description">${escapeHtml(bp.description || '暂无描述')}</div>
                                <div class="blueprint-meta">
                                    <span>发布者: ${escapeHtml(bp.username)}</span>
                                    <span>${formatDate(bp.created_at)}</span>
                                </div>
                                <div class="blueprint-stats">
                                    <span>👁️ ${bp.views || 0}</span>
                                    <span>❤️ ${bp.likes || 0}</span>
                                </div>
                                <a href="blueprint.html?id=${bp.id}" class="blueprint-link">查看详情 →</a>
                            </div>
                        `;
                    });
                    
                    totalPages = Math.ceil(result.total / 12);
                    renderPagination();
                } else {
                    grid.innerHTML = '<div class="empty">暂无蓝图，快来发布第一个吧！</div>';
                }
            } catch (error) {
                grid.innerHTML = '<div class="empty">加载失败，请刷新重试</div>';
            }
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            loadBlueprints(page);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        updateNavbar();
        loadBlueprints();
    </script>
</body>
</html>
