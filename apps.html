<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小应用 - 机械动力蓝图社区</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="page.svg">
    <style>
        .apps-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .apps-header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }
        .apps-header h1 {
            color: #e2e8f0;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .apps-header p {
            color: #94a3b8;
        }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .app-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 28px 24px;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
        .app-card:hover {
            transform: translateY(-4px);
            border-color: #3b82f6;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.15);
        }
        .app-card .app-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 12px;
            border-radius: 12px;
            overflow: hidden;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #334155;
        }
        .app-card .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .app-card .app-title {
            color: #e2e8f0;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .app-card .app-desc {
            color: #94a3b8;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .app-card .app-tag {
            display: inline-block;
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            font-size: 0.65rem;
            padding: 2px 10px;
            border-radius: 20px;
            margin-top: 12px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #38bdf8;
        }
        @media (max-width: 768px) {
            .apps-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="apps-container">
        <a href="index.html" class="back-link">← 返回首页</a>

        <div class="apps-header">
            <h1>小应用</h1>
            <p>机械动力工具集</p>
        </div>

        <div class="apps-grid">
            <!-- 火炮计算器 -->
            <a href="cannon-calc.html" class="app-card">
                <div class="app-icon">
                    <img src="632535.png" alt="火炮底座">
                </div>
                <div class="app-title">火炮计算器</div>
                <div class="app-desc">计算火炮材质是否扛得住发射药，是否会发生卡膛</div>
                <div class="app-tag">已上线</div>
            </a>
        </div>
    </div>

    <script src="sidebar.js"></script>
</body>
</html>
