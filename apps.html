<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小应用 - 机械动力蓝图社区</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="page.svg">
    <style>
        .apps-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .apps-header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }
        .apps-header h1 {
            color: #e2e8f0;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .apps-header p {
            color: #94a3b8;
        }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .app-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 28px 24px;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
        .app-card:hover {
            transform: translateY(-4px);
            border-color: #3b82f6;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.15);
        }
        .app-card .app-icon {
            font-size: 2rem;
            margin-bottom: 12px;
            color: #38bdf8;
        }
        .app-card .app-title {
            color: #e2e8f0;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .app-card .app-desc {
            color: #94a3b8;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .app-card .app-tag {
            display: inline-block;
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            font-size: 0.65rem;
            padding: 2px 10px;
            border-radius: 20px;
            margin-top: 12px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #38bdf8;
        }
        .app-card.coming-soon {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .app-card.coming-soon:hover {
            transform: none;
            border-color: #334155;
            box-shadow: none;
        }
        .coming-badge {
            background: #f97316;
            color: white;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
            vertical-align: middle;
        }
        @media (max-width: 768px) {
            .apps-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="apps-container">
        <a href="index.html" class="back-link">← 返回首页</a>

        <div class="apps-header">
            <h1>小应用</h1>
            <p>机械动力工具集，持续更新中</p>
        </div>

        <div class="apps-grid">
            <!-- 火炮计算器 -->
            <a href="cannon-calc.html" class="app-card">
                <div class="app-icon">⚡</div>
                <div class="app-title">火炮计算器</div>
                <div class="app-desc">计算火炮材质是否扛得住发射药，是否会发生卡膛</div>
                <div class="app-tag">已上线</div>
            </a>

            <!-- 预留更多应用 -->
            <div class="app-card coming-soon">
                <div class="app-icon">📐</div>
                <div class="app-title">蓝图大小估算器</div>
                <div class="app-desc">根据方块数估算蓝图文件和加载时间</div>
                <div class="app-tag">开发中 <span class="coming-badge">Coming</span></div>
            </div>

            <div class="app-card coming-soon">
                <div class="app-icon">⚙️</div>
                <div class="app-title">应力计算器</div>
                <div class="app-desc">计算机械动力机器的应力消耗与产生</div>
                <div class="app-tag">开发中 <span class="coming-badge">Coming</span></div>
            </div>

            <div class="app-card coming-soon">
                <div class="app-icon">🔧</div>
                <div class="app-title">齿轮比例计算器</div>
                <div class="app-desc">计算转速与扭矩的转换比例</div>
                <div class="app-tag">开发中 <span class="coming-badge">Coming</span></div>
            </div>

            <div class="app-card coming-soon">
                <div class="app-icon">📦</div>
                <div class="app-title">蓝图压缩工具</div>
                <div class="app-desc">在线压缩和优化 .nbt 蓝图文件</div>
                <div class="app-tag">开发中 <span class="coming-badge">Coming</span></div>
            </div>
        </div>
    </div>

    <script src="sidebar.js"></script>
</body>
</html>
