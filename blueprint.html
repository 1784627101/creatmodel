<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝图详情 - 机械动力蓝图社区</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="page.svg">
    <style>
        .detail-image {
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .detail-versions {
            background: #0f172a;
            padding: 8px 12px;
            border-radius: 8px;
            margin: 12px 0;
            font-size: 0.85rem;
            color: #9ca3af;
        }
        .mod-tag {
            background: #0f172a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #38bdf8;
            border: 1px solid #334155;
        }
        .detail-mods {
            margin: 16px 0;
        }
        .detail-mods .mods-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .detail-mods .no-mods {
            color: #64748b;
            font-size: 0.85rem;
        }
        .nbt-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .nbt-card h4 {
            color: #38bdf8;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }
        .nbt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }
        .nbt-grid .item {
            background: #1e293b;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
        }
        .nbt-grid .item .label {
            color: #94a3b8;
            font-size: 0.7rem;
            display: block;
        }
        .nbt-grid .item .value {
            color: #e2e8f0;
            font-weight: 600;
            font-size: 1rem;
        }
        .nbt-mods {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .nbt-mods .tag {
            background: #1e293b;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #38bdf8;
            border: 1px solid #334155;
        }
        .detail-link .btn {
            display: inline-block;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            Create<span>Mechanical</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>
            <a href="publish.html" class="nav-link">发布蓝图</a>
            <a href="profile.html" class="nav-link">我的发布</a>
            <a href="login.html" class="btn btn-outline">登录</a>
            <a href="register.html" class="btn btn-primary">注册</a>
        </div>
    </nav>

    <main class="container">
        <div id="detailContainer">
            <div class="loading">加载中...</div>
        </div>
    </main>

    <!-- 举报弹窗 -->
    <div id="reportModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: #1a1a1a; border-radius: 16px; padding: 32px; max-width: 400px; width: 90%;">
            <h3 style="margin-bottom: 16px;">举报蓝图</h3>
            <textarea id="reportReason" rows="4" placeholder="请填写举报原因..." style="width: 100%; padding: 12px; background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 12px; color: white; margin-bottom: 16px;"></textarea>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button class="btn btn-secondary" onclick="closeReportModal()">取消</button>
                <button class="btn btn-danger" onclick="submitReport()">提交举报</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="sidebar.js"></script>
    <script>
        let currentBlueprint = null;

        function parseMods(description) {
            if (!description) return { mods: [], text: '' };
            const match = description.match(/^【模组：([^】]+)】/);
            if (match) {
                const mods = match[1].split(/[、，,]+/).map(m => m.trim());
                const text = description.replace(/^【模组：[^】]+】\n?/, '');
                return { mods, text };
            }
            return { mods: [], text: description };
        }

        async function loadBlueprint() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                document.getElementById('detailContainer').innerHTML = '<div class="empty">无效的蓝图ID</div>';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/blueprints/${id}`);
                const result = await response.json();

                if (result.success) {
                    currentBlueprint = result.data;
                    renderBlueprint();
                } else {
                    document.getElementById('detailContainer').innerHTML = '<div class="empty">蓝图不存在或已被删除</div>';
                }
            } catch (error) {
                document.getElementById('detailContainer').innerHTML = '<div class="empty">加载失败，请刷新重试</div>';
            }
        }

        function renderBlueprint() {
            const bp = currentBlueprint;
            const container = document.getElementById('detailContainer');
            const loggedIn = isLoggedIn();
            const isOwner = loggedIn && localStorage.getItem('username') === bp.username;
            const parsed = parseMods(bp.description);

            // ===== NBT 数据展示 =====
            let nbtHtml = '';
            const hasNbtData = bp.block_count || bp.entity_count || (bp.size_x || bp.size_y || bp.size_z) || bp.nbt_mods;
            if (hasNbtData) {
                const modsList = bp.nbt_mods ? bp.nbt_mods.split(',').filter(m => m.trim()) : [];
                let modsHtml = '';
                if (modsList.length > 0) {
                    modsHtml = `<div class="nbt-mods">${modsList.map(m => `<span class="tag">${escapeHtml(m.trim())}</span>`).join('')}</div>`;
                } else {
                    modsHtml = '<span style="color:#64748b; font-size:0.85rem;">未检测到模组</span>';
                }

                nbtHtml = `
                    <div class="nbt-card">
                        <h4>📊 蓝图数据（自动解析）</h4>
                        <div class="nbt-grid">
                            ${bp.block_count ? `<div class="item"><span class="label">方块数</span><span class="value">${bp.block_count}</span></div>` : ''}
                            ${bp.entity_count ? `<div class="item"><span class="label">实体数</span><span class="value">${bp.entity_count}</span></div>` : ''}
                            ${(bp.size_x || bp.size_y || bp.size_z) ? `<div class="item"><span class="label">尺寸</span><span class="value">${bp.size_x || 0}×${bp.size_y || 0}×${bp.size_z || 0}</span></div>` : ''}
                        </div>
                        <div style="margin-top: 10px;">
                            <span style="color:#94a3b8; font-size:0.85rem;">检测到的模组</span>
                            ${modsHtml}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="detail-card">
                    ${bp.preview_image ? `<img src="${bp.preview_image}" class="detail-image" alt="${escapeHtml(bp.title)}">` : ''}
                    <h1 class="detail-title">${escapeHtml(bp.title)}</h1>
                    <div class="detail-meta">
                        <span>发布者: <a href="profile.html?id=${bp.user_id}" style="color:#3b82f6;text-decoration:none;">${escapeHtml(bp.username)}</a></span>
                        <span>${formatDate(bp.upload_time || bp.created_at)}</span>
                    </div>
                    <div class="detail-versions">
                        MC版本: ${escapeHtml(bp.mc_version || '未指定')} | Create版本: ${escapeHtml(bp.create_version || '未指定')}
                    </div>

                    <div class="detail-mods">
                        <h3>用到的模组</h3>
                        <div class="mods-container">
                            ${parsed.mods.length > 0 ? 
                                parsed.mods.map(mod => 
                                    `<span class="mod-tag">${escapeHtml(mod)}</span>`
                                ).join('') : 
                                '<span class="no-mods">未指定</span>'
                            }
                        </div>
                    </div>

                    ${nbtHtml}

                    <div class="detail-description">
                        <h3>描述</h3>
                        <p>${escapeHtml(parsed.text || '暂无描述')}</p>
                    </div>
                    <div class="detail-link">
                        <h3>下载链接</h3>
                        <a href="${escapeHtml(bp.original_link)}" target="_blank" rel="noopener noreferrer" class="btn btn-primary" onclick="recordDownload()">点击下载</a>
                        <p style="margin-top: 8px; font-size: 0.75rem; color: #6b7280; word-break: break-all;">链接：${escapeHtml(bp.original_link)}</p>
                        <p style="margin-top: 4px; font-size: 0.7rem; color: #64748b;">下载量：${bp.downloads || 0}</p>
                    </div>
                    <div style="display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap;">
                        ${loggedIn ? `<button class="btn btn-outline" onclick="openReportModal()">举报</button>` : ''}
                        ${isOwner ? `<button class="btn btn-danger" onclick="deleteBlueprint()">删除</button>` : ''}
                    </div>
                </div>
            `;
        }

        function openReportModal() {
            if (!isLoggedIn()) {
                showMessage('请先登录再举报', 'error');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                return;
            }
            document.getElementById('reportModal').style.display = 'flex';
        }

        function closeReportModal() {
            document.getElementById('reportModal').style.display = 'none';
            document.getElementById('reportReason').value = '';
        }

        async function submitReport() {
            const reason = document.getElementById('reportReason').value.trim();
            if (!reason) {
                showMessage('请填写举报原因', 'error');
                return;
            }

            try {
                const response = await authFetch(`/blueprints/${currentBlueprint.id}/report`, {
                    method: 'POST',
                    body: JSON.stringify({ reason })
                });
                const result = await response.json();

                if (result.success) {
                    showMessage('举报已提交，感谢反馈', 'success');
                    closeReportModal();
                } else {
                    showMessage(result.error, 'error');
                }
            } catch (error) {
                showMessage('提交失败: ' + error.message, 'error');
            }
        }

        async function deleteBlueprint() {
            if (!confirm('确定删除这个蓝图吗？此操作不可恢复')) return;

            try {
                const response = await authFetch(`/blueprints/${currentBlueprint.id}`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (result.success) {
                    showMessage('删除成功', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showMessage(result.error, 'error');
                }
            } catch (error) {
                showMessage('删除失败: ' + error.message, 'error');
            }
        }

        async function recordDownload() {
            if (!currentBlueprint) return;
            try {
                await fetch(`${API_URL}/blueprints/${currentBlueprint.id}/download`, {
                    method: 'POST'
                });
                currentBlueprint.downloads = (currentBlueprint.downloads || 0) + 1;
                const downloadEl = document.querySelector('.detail-link p:last-child');
                if (downloadEl) {
                    downloadEl.textContent = `下载量：${currentBlueprint.downloads}`;
                }
            } catch (error) {
                console.error('记录下载失败:', error);
            }
        }

        window.addEventListener('click', (e) => {
            const modal = document.getElementById('reportModal');
            if (e.target === modal) {
                closeReportModal();
            }
        });

        updateNavbar();
        loadBlueprint();
    </script>
</body>
</html>
